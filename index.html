<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>POS Ventas</title>

    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>POS Ventas</h1>

<!-- FORMULARIO -->

<label>Categoría</label>
<select id="categoria"></select>

<br><br>

<label>Público</label>
<select id="publico"></select>

<br><br>

<label>Producto</label>
<select id="producto"></select>

<hr>

<div id="detalleProducto"></div>

<input type="number" id="cantidad" placeholder="Cantidad">

<br><br>

<input type="text" id="cliente" placeholder="Cliente">

<br><br>

<div id="carrito"></div>

<button id="btnAgregar">
    Agregar al carrito
</button>

<button id="btnFinalizar">
    Finalizar compra
</button>

    <div id="panelPago" style="display:none;">

    <hr>

    <h2>Finalizar compra</h2>

    <h3>Resumen de la venta</h3>

    <p>
        <b>Cliente:</b>
        <span id="clienteResumen"></span>
    </p>
    
    <p>
        <b>Productos:</b>
        <span id="productosResumen"></span>
    </p>
    
    <p>
        <b>Total:</b>
        $<span id="totalResumen">0</span>
    </p>
    
    <hr>

    <label>Medio de pago</label>

    <select id="medioPagoFinal">

        <option>Efectivo</option>

        <option>Transferencia Breve</option>

    </select>

    <br><br>

    <label>Abono inicial</label>

    <input
        type="number"
        id="montoPago"
        placeholder="0">

    <br><br>

    <p>
        <b>Saldo:</b>
    
        $<span id="saldoResumen">0</span>
    </p>
    
    <p>
        <b>Estado:</b>
    
        <span id="estadoResumen">
            Pendiente
        </span>
    </p>

    <br><br>

    <button id="btnConfirmarVenta">

        Confirmar venta

    </button>

</div>

<!-- 🔐 LOGIN GUARD BIEN HECHO -->
<script>
    const usuario = JSON.parse(localStorage.getItem("usuario"));

    if (!usuario) {
        alert("Debes iniciar sesión");
        window.location.href = "login.html";
    }

</script>

    <h3>Alertas</h3>

    <div id="alertas"></div>

<script type="module" src="js/app.js"></script>

</body>
</html>
