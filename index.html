<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS Ventas</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <span class="navbar-logo">✨ POS</span>
    <div class="navbar-nav">
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="index.html" class="activo">🛒 Ventas</a>
      <a href="pendientes.html">💳 Cartera</a>
      <a href="inventario.html">📦 Inventario</a>
       <a href="compras.html">🛍 Compras</a>
<a href="caja.html">💰 Caja</a>

    </div>
    <div class="navbar-acciones">
      <span class="navbar-usuario" id="usuarioInfo"></span>
      <button class="btn-peligro btn-salir" onclick="cerrarSesion()">🚪 Salir</button>
    </div>
  </nav>

  <div class="contenedor">

    <h1 class="page-titulo">Punto de Venta</h1>

    <!-- SELECCIÓN DE PRODUCTO -->
    <div class="card">
      <p class="card-titulo">Seleccionar producto</p>

      <div class="form-grid">
        <div class="form-grupo">
          <label for="categoria">Categoría</label>
          <select id="categoria">
            <option value="">Seleccione categoría</option>
          </select>
        </div>

        <div class="form-grupo">
          <label for="publico">Público</label>
          <select id="publico">
            <option value="">Seleccione público</option>
          </select>
        </div>

        <div class="form-grupo">
          <label for="producto">Producto</label>
          <select id="producto">
            <option value="">Seleccione producto</option>
          </select>
        </div>

        <div class="form-grupo">
          <label for="cantidad">Cantidad</label>
          <input type="number" id="cantidad" placeholder="0" min="1">
        </div>
      </div>

      <!-- Detalle del producto seleccionado -->
      <div id="detalleProducto" class="detalle-producto"></div>

      <div class="acciones-producto">
        <button class="btn-primario" id="btnAgregar">+ Agregar al carrito</button>
      </div>
    </div>

    <!-- CARRITO -->
    <div class="card" id="carritoCard">
      <p class="card-titulo">🛒 Carrito</p>
      <div id="carrito">
        <p class="texto-vacio">El carrito está vacío</p>
      </div>

      <div class="form-grupo" style="margin-top:12px;">
        <label for="cliente">Cliente</label>
        <input type="text" id="cliente" placeholder="Nombre del cliente (opcional)">
      </div>

      <div class="acciones-producto">
        <button class="btn-secundario" id="btnFinalizar">Finalizar compra →</button>
      </div>
    </div>

    <!-- PANEL DE PAGO -->
    <div class="card" id="panelPago" hidden>
      <p class="card-titulo">💳 Finalizar compra</p>

      <div class="resumen-venta">
        <div class="resumen-fila">
          <span>Cliente</span>
          <strong id="clienteResumen">—</strong>
        </div>
        <div class="resumen-fila">
          <span>Productos</span>
          <strong id="productosResumen">0</strong>
        </div>
        <div class="resumen-fila resumen-total">
          <span>Total</span>
          <strong>$<span id="totalResumen">0</span></strong>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-grupo">
          <label for="medioPagoFinal">Medio de pago</label>
          <select id="medioPagoFinal">
            <option value="Efectivo">Efectivo</option>
            <option value="Transferencia Breve">Transferencia Breve</option>
            <option value="Pendiente">Pendiente</option>
          </select>
        </div>

        <div class="form-grupo">
          <label for="montoPago">Monto pagado</label>
          <input type="number" id="montoPago" placeholder="0" min="0">
        </div>
      </div>

      <div class="resumen-venta">
        <div class="resumen-fila">
          <span>Saldo pendiente</span>
          <strong>$<span id="saldoResumen">0</span></strong>
        </div>
        <div class="resumen-fila">
          <span>Estado</span>
          <strong id="estadoResumen">Pendiente</strong>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-outline" id="btnCancelarPago">← Volver</button>
        <button class="btn-primario" id="btnConfirmarVenta">✔ Confirmar venta</button>
      </div>
    </div>

    <!-- ALERTAS DE STOCK -->
    <div id="alertas"></div>

    <!-- HISTORIAL DEL DÍA -->
    <div class="card" id="historialCard">
      <p class="card-titulo">📋 Mis ventas de hoy</p>
      <div id="historialHoy">
        <p class="texto-vacio">Sin ventas registradas hoy</p>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
