<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login POS</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2d6cdf;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1f4fb5;
        }

        h2 {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Iniciar Sesión</h2>

    <input type="text" id="username" placeholder="Usuario">

    <input type="password" id="password" placeholder="Contraseña">

    <button id="loginBtn">Ingresar</button>

</div>

<!-- JS módulo -->
<script type="module" src="js/login.js"></script>

</body>
</html>
